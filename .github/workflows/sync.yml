name: Sync match data

on:
  schedule:
    - cron: '* * * * *' # every 1 minute
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
