name: Sync match data

on:
  schedule:
    - cron: '* 16-23 * * *' # every minute, 23:00–00:59 GMT+7
    - cron: '* 0-2 * * *' # every minute, 07:00–09:59 GMT+7
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
