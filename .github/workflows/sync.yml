name: Sync match data

on:
  schedule:
    - cron: '* 16-23 * * *' # every minute, 23:00–06:59 GMT+7
    - cron: '* 0-5 * * *' # every minute, 07:00–12:59 GMT+7
    - cron: '*/15 6-15 * * *' # every 15 min, 13:00–22:59 GMT+7
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
